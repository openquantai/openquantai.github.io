<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenQuantAI</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    img {
      max-width: min(80vw, 420px);
      height: auto;
      display: block;
      border-radius: 12px;
    }

    #image-fallback {
      font-family: Arial, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <img id="profile-image" src="https://github.com/openquantai.png" alt="OpenQuantAI profile picture">
  <p id="image-fallback" role="status" aria-live="polite" aria-atomic="true" hidden>Image temporarily unavailable.</p>
  <script>
    const profileImage = document.getElementById("profile-image");
    const imageFallback = document.getElementById("image-fallback");

    profileImage.addEventListener("error", () => {
      profileImage.style.display = "none";
      imageFallback.hidden = false;
    });
  </script>
</body>
</html>
