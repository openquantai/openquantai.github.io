<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenQuantAI</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    img {
      max-width: min(80vw, 420px);
      height: auto;
      display: block;
      border-radius: 12px;
    }

    #image-fallback {
      display: none;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <img src="https://github.com/openquantai.png" alt="OpenQuantAI GitHub profile picture" onerror="this.style.display='none'; document.getElementById('image-fallback').style.display='block';">
  <p id="image-fallback">OpenQuantAI GitHub profile picture is unavailable.</p>
</body>
</html>
